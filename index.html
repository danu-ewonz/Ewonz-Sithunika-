<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 🔥 OPEN SCREEN -->
<div id="openScreen">

  <h1 class="main-title">
    Danu Ewonz & Sadali Sithunika
  </h1>

  <p class="sub-title">We are getting married</p>

  <p class="invite-text">
    You are warmly invited to our special day
  </p>

  <!-- 💎 FIXED BUTTON (with typing) -->
  <button class="open-btn" onclick="openInvitation()">
    <span class="typing">OPEN</span>
  </button>

</div>

<!-- 💍 MAIN CONTENT -->
<div id="weddingContent">

  <div class="wedding-card">

    <div class="month">NOVEMBER</div>
    <div class="date">28</div>

    <div class="details">
      SATURDAY | 7:00 PM<br>
      2026
    </div>

    <div class="venue">
      Grace Palace Hotel<br>
      Colombo, Sri Lanka
    </div>

    <div class="names">
      Danu Ewonz & Sadali Sithunika
    </div>

    <h2>Countdown To Our Wedding</h2>

    <div id="countdown">Loading...</div>

    <div class="quote">
      "Two hearts, one soul, one journey."
    </div>

    <div class="flower">❦ ❀ ❦</div>

  </div>

</div>

<!-- ⚡ SCRIPT CONNECT -->
<script src="script.js"></script>

</body>
</html>
