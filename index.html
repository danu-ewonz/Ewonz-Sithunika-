<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Countdown</title>

  <!-- CSS link -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wedding-card">

  <div class="month">NOVEMBER</div>

  <div class="date">28</div>

  <div class="details">
    SATURDAY | 7:00 PM<br>
    2026
  </div>

  <div class="venue">
    Grace Palace Hotel<br>
    Piliyandala, Colombo, Sri Lanka
  </div>

  <!-- 💍 NAMES -->
  <div class="names">
    Danu Ewonz ❤️ Sadali Sithunika
  </div>

  <h2>Countdown To Our Wedding</h2>

  <div id="countdown">Loading...</div>

  <div class="quote">
    "Two hearts, one soul, one beautiful journey."
  </div>

  <div class="flower">❦ ❀ ❦</div>

</div>

<script>
const countdownEl = document.getElementById("countdown");

const weddingDate = new Date("2026-11-28T19:00:00+05:30").getTime();

function updateCountdown() {

  const now = new Date().getTime();
  const distance = weddingDate - now;

  if (distance <= 0) {
    countdownEl.innerHTML = "We Are Married ❤️";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  countdownEl.innerHTML =
    days + " Days " +
    hours + " Hours " +
    minutes + " Minutes " +
    seconds + " Seconds";
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
