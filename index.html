<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>

/* 🌑 PAGE */
body{
  margin:0;
  font-family: Georgia, serif;
  background:#0b0b0b;
  color:#fff;
  overflow:hidden;
}

/* 🌸 FLOATING PETALS */
.petal{
  position:absolute;
  top:-10px;
  font-size:20px;
  color:gold;
  animation: fall linear infinite;
  opacity:0.8;
}

@keyframes fall{
  0%{transform:translateY(-10vh) rotate(0deg);}
  100%{transform:translateY(110vh) rotate(360deg);}
}

/* 🔥 OPEN SCREEN */
#openScreen{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:#000;
}

/* TYPE TEXT */
.main-title{
  font-size:30px;
  color:gold;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  border-right:2px solid gold;
  width:0;
  animation: typing 3s steps(30,end) forwards, blink 0.7s infinite;
}

@keyframes typing{
  from{width:0;}
  to{width:100%;}
}

@keyframes blink{
  50%{border-color:transparent;}
}

/* BUTTON */
.open-btn{
  margin-top:20px;
  padding:16px 45px;
  border:2px solid gold;
  background:transparent;
  color:gold;
  border-radius:40px;
  cursor:pointer;
  transition:0.3s;
}

.open-btn:hover{
  background:gold;
  color:#000;
}

/* 💍 MAIN CONTENT */
#weddingContent{
  display:none;
  animation: fadeIn 1.5s ease forwards;
}

/* CARD */
.wedding-card{
  text-align:center;
  padding:40px;
  margin:60px auto;
  max-width:600px;

  position:relative;
  overflow:hidden;

  border-radius:20px;
  border:3px solid gold;

  animation: zoomIn 1.2s ease;
}

/* BACKGROUND IMAGE */
.wedding-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("./file_00000000c388722f97453bfd91d1655b.png") center/cover no-repeat;
  z-index:0;
}

/* DARK LAYER */
.wedding-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:1;
}

/* TEXT ABOVE */
.wedding-card *{
  position:relative;
  z-index:2;
}

/* NAME GLow */
.names{
  font-size:26px;
  color:gold;
  animation: glow 2s infinite;
}

/* COUNTDOWN */
#countdown{
  font-size:22px;
  animation: pulse 1.5s infinite;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes zoomIn{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

@keyframes glow{
  0%{text-shadow:0 0 5px gold;}
  50%{text-shadow:0 0 20px gold;}
  100%{text-shadow:0 0 5px gold;}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

</style>

</head>

<body>

<!-- 🌸 PETALS (JS will add more) -->
<div class="petal">❀</div>
<div class="petal" style="left:20%; animation-duration:6s;">❀</div>
<div class="petal" style="left:40%; animation-duration:8s;">❀</div>
<div class="petal" style="left:60%; animation-duration:7s;">❀</div>
<div class="petal" style="left:80%; animation-duration:9s;">❀</div>

<!-- 🔥 OPEN SCREEN -->
<div id="openScreen">

  <h1 class="main-title" id="typeText"></h1>

  <button class="open-btn" onclick="openInvitation()">
    Open Invitation
  </button>

</div>

<!-- 💍 MAIN CONTENT -->
<div id="weddingContent">

  <div class="wedding-card">

    <div class="month">NOVEMBER</div>
    <div class="date">28</div>

    <div class="details">
      SATURDAY | 7:00 PM<br>
      2026
    </div>

    <div class="venue">
      Grace Palace Hotel<br>
      Colombo, Sri Lanka
    </div>

    <div class="names">
      Danu Ewonz & Sadali Sithunika
    </div>

    <h2>Countdown</h2>
    <div id="countdown">Loading...</div>

    <div class="quote">
      "Two hearts, one soul, one journey."
    </div>

    <div class="flower">❦ ❀ ❦</div>

  </div>

</div>

<script>

/* TYPE EFFECT */
const text = "Danu Ewonz & Sadali Sithunika";
let i = 0;

function type(){
  if(i < text.length){
    document.getElementById("typeText").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 100);
  }
}
type();

/* OPEN */
function openInvitation(){
  document.getElementById("openScreen").style.display = "none";
  document.getElementById("weddingContent").style.display = "block";
}

/* COUNTDOWN */
const countdownEl = document.getElementById("countdown");
const weddingDate = new Date("2026-11-28T19:00:00+05:30").getTime();

function updateCountdown(){
  const now = new Date().getTime();
  const distance = weddingDate - now;

  if(distance <= 0){
    countdownEl.innerHTML = "We Are Married ❤️";
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((distance%(1000*60*60))/(1000*60));
  const s = Math.floor((distance%(1000*60))/1000);

  countdownEl.innerHTML = d+" Days "+h+" Hours "+m+" Minutes "+s+" Seconds";
}

setInterval(updateCountdown,1000);

</script>

</body>
</html>
