<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>

/* 🌑 BODY */
body{
  margin:0;
  font-family: Georgia, serif;
  background:#000;
  color:#fff;
}

/* 🔥 OPEN SCREEN */
#openScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  background: url("background.jpg") center/cover no-repeat;
  position:relative;
}

/* DARK OVERLAY */
#openScreen::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

#openScreen *{
  position:relative;
  z-index:2;
}

/* ✨ TYPING NAME ONLY */
.typing-name{
  font-size:26px;
  color:gold;

  white-space:nowrap;
  overflow:hidden;
  border-right:2px solid gold;

  width:0;
  animation: typing 3s steps(30) infinite, blink 0.7s infinite;
}

@keyframes typing{
  0%{width:0;}
  50%{width:100%;}
  100%{width:0;}
}

@keyframes blink{
  50%{border-color:transparent;}
}

/* OPEN BUTTON */
.open-btn{
  margin-top:20px;
  padding:14px 50px;
  font-size:18px;

  border:2px solid gold;
  border-radius:40px;

  background:#111;
  color:gold;

  cursor:pointer;
  transition:0.3s;
}

.open-btn:hover{
  background:gold;
  color:#000;
  transform:scale(1.05);
}

/* MAIN CONTENT */
#weddingContent{
  display:none;
  padding:20px;
  text-align:center;
}

/* CARD */
.wedding-card{
  max-width:500px;
  margin:auto;
  padding:30px;

  border:2px solid gold;
  border-radius:20px;

  box-shadow:0 0 20px rgba(255,215,0,0.3);
}

/* TEXT */
.month{color:gold;}
.date{font-size:60px;font-weight:bold;}
.details,.venue{color:#ddd;}
.names{color:gold;font-size:22px;}
#countdown{color:gold;font-size:20px;}

</style>
</head>

<body>

<!-- OPEN SCREEN -->
<div id="openScreen">

  <!-- ONLY NAME TYPING -->
  <h1 class="typing-name">
    Danu Ewonz & Sadali Sithunika
  </h1>

  <p>We are getting married</p>

  <!-- OPEN BUTTON -->
  <button class="open-btn" onclick="openInvitation()">
    OPEN
  </button>

</div>

<!-- MAIN CONTENT -->
<div id="weddingContent">

  <div class="wedding-card">

    <div class="month">NOVEMBER</div>
    <div class="date">28</div>

    <div class="details">
      SATURDAY | 7:00 PM<br>
      2026
    </div>

    <div class="venue">
      Grace Palace Hotel<br>
      Colombo, Sri Lanka
    </div>

    <div class="names">
      Danu Ewonz & Sadali Sithunika
    </div>

    <h2>Countdown</h2>
    <div id="countdown">Loading...</div>

  </div>

</div>

<script>

/* OPEN FUNCTION */
function openInvitation(){
  document.getElementById("openScreen").style.display = "none";
  document.getElementById("weddingContent").style.display = "block";
  startCountdown();
}

/* COUNTDOWN */
function startCountdown(){

  const el = document.getElementById("countdown");
  const weddingDate = new Date("2026-11-28T19:00:00+05:30").getTime();

  function update(){
    const now = new Date().getTime();
    const diff = weddingDate - now;

    if(diff <= 0){
      el.innerHTML = "We Are Married ❤️";
      return;
    }

    const d = Math.floor(diff/(1000*60*60*24));
    const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const m = Math.floor((diff%(1000*60*60))/(1000*60));
    const s = Math.floor((diff%(1000*60))/1000);

    el.innerHTML =
      `${d} Days ${h} Hours ${m} Minutes ${s} Seconds`;
  }

  update();
  setInterval(update,1000);
}

</script>

</body>
</html>
