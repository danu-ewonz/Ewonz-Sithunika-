<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- OPEN SCREEN -->
<div id="openScreen">

    <h1 class="main-title">
        Danu Ewonz & Sadali Sithunika
    </h1>

    <p class="sub-title">We Are Getting Married</p>

    <p class="invite-text">
        You are warmly invited to our special day
    </p>

    <button class="open-btn" onclick="openInvitation()">
        Open Invitation
    </button>

</div>

<!-- INVITATION -->
<div id="weddingContent">

    <div class="wedding-card">

        <div class="month">NOVEMBER</div>

        <div class="date">28</div>

        <div class="details">
            SATURDAY | 6:00 PM<br>
            2026
        </div>

        <div class="venue">
            Grace Palace Hotel, Piliyandala, Colombo, Sri Lanka
        </div>

        <div class="names">
            Danu Ewonz & Sadali Sithunika
        </div>

        <h2>Countdown To Our Wedding</h2>

        <div id="countdown">Loading...</div>

        <div class="quote">
            "Together is a beautiful journey."
        </div>

    </div>

</div>

<script>

function openInvitation(){
    document.getElementById("openScreen").style.display="none";
    document.getElementById("weddingContent").style.display="block";
}

/* COUNTDOWN */
const countdownEl = document.getElementById("countdown");
const weddingDate = new Date("2026-11-28T18:00:00+05:30").getTime();

function updateCountdown(){

    const now = new Date().getTime();
    const distance = weddingDate - now;

    if(distance <= 0){
        countdownEl.innerHTML = "We Are Married";
        return;
    }

    const d = Math.floor(distance/(1000*60*60*24));
    const h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const m = Math.floor((distance%(1000*60*60))/(1000*60));
    const s = Math.floor((distance%(1000*60))/1000);

    countdownEl.innerHTML =
        d+" Days "+h+" Hours "+m+" Minutes "+s+" Seconds";
}

setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
